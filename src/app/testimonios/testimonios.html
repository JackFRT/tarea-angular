<section class="bg-gray-50 py-24 md:py-32">
  <div class="max-w-7xl mx-auto px-6">
    <div class="flex items-center justify-between mb-16 gap-6">
      <div>
        <span class="etiqueta-seccion">— Reseñas y testimonios</span>
        <h2 class="titulo-seccion">Nuestros clientes satisfechos</h2>
      </div>
      <div class="flex gap-4 items-center flex-shrink-0">
        <button class="btn-flecha">&lt;</button>
        <button class="btn-flecha bg-gray-950 text-white hover:bg-black">&gt;</button>
      </div>
    </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      @for (testimonio of listaTestimonios; track testimonio.nombre) {
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
          <p class="text-gray-600 mb-4">"{{ testimonio.comentario }}"</p>
          <div class="flex items-center gap-4">
            <img [src]="testimonio.foto" alt="Cliente" class="w-12 h-12 rounded-full">
            <div>
              <h4 class="font-bold text-sm">{{ testimonio.nombre }}</h4>
              <span class="text-xs">{{ testimonio.estrellas }}</span>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
